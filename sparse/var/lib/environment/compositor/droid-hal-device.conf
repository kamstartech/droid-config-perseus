# Perseus (Mi Mix 3) — hwcomposer-EGL rendering via libhybris (Adreno 630 GPU)
# Stack: Qt hwcomposer -> libhybris EGL -> Android kgsl (hardware)
# libhybris expects its Android 15 linker paths here because systemd user units do
# not source /etc/profile.d/hybris-android15.sh before launching lipstick.
QT_QPA_PLATFORM=hwcomposer
HYBRIS_EGLPLATFORM=hwcomposer
HYBRIS_LINKER_DIR=/usr/lib64/libhybris/linker
HYBRIS_LD_LIBRARY_PATH=/data/local/lib64:/system/lib64/bootstrap:/system/lib64:/vendor/lib64:/system/lib64/vndk-sp
ANDROID_ROOT=/system
ANDROID_DATA=/data
QT_DEVICE_PIXEL_RATIO=1.5
# Keep to suppress eglfs built-in evdev reader if any eglfs codepath is invoked.
QT_QPA_EGLFS_DISABLE_INPUT=1
LIPSTICK_OPTIONS=-plugin evdevtouch -plugin evdevkeyboard
