# Perseus (Mi Mix 3) — Mesa KMS rendering via kms_swrast (CPU)
# Future: replace kms_swrast with msm (freedreno) for GPU acceleration
QT_QPA_PLATFORM=eglfs
QT_QPA_EGLFS_INTEGRATION=eglfs_kms
QT_QPA_EGLFS_KMS_CONFIG=/etc/qt-kms.json
EGL_PLATFORM=gbm
MESA_LOADER_DRIVER_OVERRIDE=kms_swrast
LIBGL_ALWAYS_SOFTWARE=1
QT_DEVICE_PIXEL_RATIO=1.5
LIPSTICK_OPTIONS=-plugin evdevtouch -plugin evdevkeyboard
