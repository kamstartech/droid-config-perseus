# Perseus (Mi Mix 3) — Mesa KMS rendering via freedreno (Adreno 630 GPU)
# Stack: Qt eglfs_kms -> Mesa EGL (GBM/KMS) -> msm/freedreno (hardware)
QT_QPA_PLATFORM=eglfs
QT_QPA_EGLFS_INTEGRATION=eglfs_kms
QT_QPA_EGLFS_KMS_CONFIG=/etc/qt-kms.json
EGL_PLATFORM=gbm
MESA_LOADER_DRIVER_OVERRIDE=msm
QT_DEVICE_PIXEL_RATIO=1.5
LIPSTICK_OPTIONS=-plugin evdevtouch -plugin evdevkeyboard
